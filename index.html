<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eisenhower Matrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --surface: #FDFCFA;
    --surface2: #F0EDE6;
    --border: #E2DDD4;
    --border2: #CCC8BE;
    --text: #1A1916;
    --text2: #6B6760;
    --text3: #A09C95;

    --q1: #C0392B;
    --q1-light: #FAF0EE;
    --q1-mid: #F5D5D0;
    --q1-accent: #E74C3C;

    --q2: #27AE60;
    --q2-light: #EDFAF3;
    --q2-mid: #C8EDD8;
    --q2-accent: #2ECC71;

    --q3: #D68910;
    --q3-light: #FDF8EC;
    --q3-mid: #F5E3AA;
    --q3-accent: #F39C12;

    --q4: #7F8C8D;
    --q4-light: #F4F4F3;
    --q4-mid: #D5D8D9;
    --q4-accent: #95A5A6;

    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
  }

  html { font-size: 16px; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    padding: 2rem 2.5rem 1.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo-block h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -0.5px;
    line-height: 1;
    color: var(--text);
  }

  .logo-block p {
    font-size: 0.8rem;
    color: var(--text3);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .header-stats {
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }

  .stat {
    text-align: right;
  }

  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    line-height: 1;
    color: var(--text);
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'DM Mono', monospace;
  }

  .stat-divider {
    width: 1px;
    height: 32px;
    background: var(--border);
  }

  /* ── ADD TASK BAR ── */
  .add-bar {
    padding: 1.25rem 2.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .add-bar input[type="text"] {
    flex: 1;
    min-width: 200px;
    height: 42px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 0 14px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .add-bar input[type="text"]:focus {
    border-color: var(--text2);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
  }

  .add-bar input::placeholder { color: var(--text3); }

  .quadrant-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .pill {
    height: 42px;
    padding: 0 16px;
    border-radius: 8px;
    border: 1.5px solid transparent;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    color: var(--text2);
  }

  .pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .pill:hover { background: var(--border); color: var(--text); }

  .pill.active[data-q="q1"] { background: var(--q1-light); border-color: var(--q1); color: var(--q1); }
  .pill.active[data-q="q2"] { background: var(--q2-light); border-color: var(--q2); color: var(--q2); }
  .pill.active[data-q="q3"] { background: var(--q3-light); border-color: var(--q3); color: var(--q3); }
  .pill.active[data-q="q4"] { background: var(--q4-light); border-color: var(--q4); color: var(--q4); }

  .btn-add {
    height: 42px;
    padding: 0 22px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .btn-add:hover { opacity: 0.85; }
  .btn-add:active { transform: scale(0.97); }

  /* ── MATRIX GRID ── */
  .matrix {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 0;
    padding: 0;
    flex: 1;
  }

  .axis-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    padding: 0.75rem 2.5rem 0;
  }

  .axis-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    text-align: center;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--border2);
  }

  .main-content {
    padding: 1.25rem 2.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .quadrant-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
  }

  /* ── QUADRANT CARD ── */
  .quadrant {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.2s;
  }

  .quadrant:hover {
    box-shadow: var(--shadow-lg);
  }

  .quadrant.drag-over {
    outline: 2px dashed var(--border2);
    outline-offset: -2px;
  }

  .q-header {
    padding: 1rem 1.25rem 0.85rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .q-badge {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9rem;
    font-weight: 600;
    flex-shrink: 0;
  }

  .q1 .q-badge { background: var(--q1-mid); color: var(--q1); }
  .q2 .q-badge { background: var(--q2-mid); color: var(--q2); }
  .q3 .q-badge { background: var(--q3-mid); color: var(--q3); }
  .q4 .q-badge { background: var(--q4-mid); color: var(--q4); }

  .q-top { height: 3px; }
  .q1 .q-top { background: var(--q1); }
  .q2 .q-top { background: var(--q2); }
  .q3 .q-top { background: var(--q3); }
  .q4 .q-top { background: var(--q4); }

  .q-title-block { flex: 1; }

  .q-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text);
    line-height: 1.2;
  }

  .q-sub {
    font-size: 0.72rem;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  .q-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  .q1 .q-count { background: var(--q1-light); color: var(--q1); }
  .q2 .q-count { background: var(--q2-light); color: var(--q2); }
  .q3 .q-count { background: var(--q3-light); color: var(--q3); }
  .q4 .q-count { background: var(--q4-light); color: var(--q4); }

  /* ── TASK LIST ── */
  .task-list {
    padding: 0.75rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-height: 60px;
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: grab;
    transition: all 0.15s;
    animation: slideIn 0.18s ease;
    position: relative;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task-item:hover {
    border-color: var(--border2);
    background: var(--surface);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .task-item.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--text3);
  }

  .task-item.done {
    opacity: 0.55;
  }

  .task-check {
    width: 17px; height: 17px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    cursor: pointer;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    background: var(--surface);
  }

  .task-check:hover { border-color: var(--text2); }

  .task-item.done .task-check {
    background: var(--text2);
    border-color: var(--text2);
  }

  .task-check svg { display: none; }
  .task-item.done .task-check svg { display: block; }

  .task-text {
    flex: 1;
    font-size: 0.87rem;
    line-height: 1.45;
    color: var(--text);
    padding-top: 1px;
  }

  .task-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    flex-shrink: 0;
  }

  .task-del {
    width: 20px; height: 20px;
    border: none; background: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    transition: all 0.12s;
    opacity: 0;
  }

  .task-item:hover .task-del { opacity: 1; }
  .task-del:hover { color: var(--q1); background: var(--q1-light); }

  .task-date {
    font-size: 0.68rem;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .empty-state {
    padding: 1.5rem 1rem;
    text-align: center;
    color: var(--text3);
    font-size: 0.82rem;
    font-style: italic;
    font-family: 'DM Serif Display', serif;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 0.75rem 2.5rem 0;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    margin-right: 4px;
  }

  .filter-btn {
    height: 28px;
    padding: 0 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.12s;
  }

  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(20,18,14,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: 16px;
    padding: 2rem;
    width: min(480px, 90vw);
    box-shadow: var(--shadow-lg);
    transform: translateY(12px);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    font-weight: 400;
    margin-bottom: 1.25rem;
  }

  .field { margin-bottom: 1rem; }
  .field label {
    display: block;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'DM Mono', monospace;
    color: var(--text2);
    margin-bottom: 6px;
  }

  .field input[type="text"],
  .field input[type="date"],
  .field textarea,
  .field select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    resize: none;
  }

  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--text2);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
  }

  .modal-actions {
    display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem;
  }

  .btn-cancel {
    height: 38px; padding: 0 18px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    background: none;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.12s;
  }

  .btn-cancel:hover { background: var(--surface2); color: var(--text); }

  .btn-save {
    height: 38px; padding: 0 20px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.12s;
  }

  .btn-save:hover { opacity: 0.82; }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    padding: 0 2.5rem 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-bar-bg {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--q2) 0%, var(--q2-accent) 100%);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-pct {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text3);
    min-width: 34px;
    text-align: right;
  }

  /* ── DRAG GHOST ── */
  .drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    opacity: 0.85;
    transform: rotate(2deg) scale(1.02);
  }

  @media (max-width: 720px) {
    header { padding: 1.25rem 1.25rem 1rem; }
    .add-bar { padding: 1rem 1.25rem; }
    .filter-bar { padding: 0.75rem 1.25rem 0; }
    .axis-row { padding: 0.75rem 1.25rem 0; }
    .main-content { padding: 1rem 1.25rem 1.5rem; }
    .quadrant-row { grid-template-columns: 1fr; }
    .axis-row { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <h1>Eisenhower Matrix</h1>
    <p>Priority · Clarity · Action</p>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="s-total">0</div>
      <div class="stat-label">Tasks</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="s-done">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="s-q1">0</div>
      <div class="stat-label">Critical</div>
    </div>
  </div>
</header>

<div class="add-bar">
  <input type="text" id="task-input" placeholder="Describe your task…" autocomplete="off">
  <div class="quadrant-pills">
    <button class="pill active" data-q="q1"><span class="dot" style="background:var(--q1)"></span> Do First</button>
    <button class="pill" data-q="q2"><span class="dot" style="background:var(--q2)"></span> Schedule</button>
    <button class="pill" data-q="q3"><span class="dot" style="background:var(--q3)"></span> Delegate</button>
    <button class="pill" data-q="q4"><span class="dot" style="background:var(--q4)"></span> Eliminate</button>
  </div>
  <button class="btn-add" onclick="quickAdd()">+ Add</button>
</div>

<div class="filter-bar">
  <span class="filter-label">Show</span>
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
  <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Active</button>
  <button class="filter-btn" data-filter="done" onclick="setFilter('done')">Done</button>
</div>

<div style="padding: 0.75rem 2.5rem 0;">
  <div class="progress-wrap" style="padding:0">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-pct" id="progress-pct">0%</div>
  </div>
</div>

<div class="axis-row">
  <div class="axis-label">▲ Urgent</div>
  <div class="axis-label">Not Urgent ▲</div>
</div>

<div class="main-content">
  <div class="quadrant-row">
    <div class="quadrant q1" id="pane-q1" ondragover="onDragOver(event,'q1')" ondrop="onDrop(event,'q1')" ondragleave="onDragLeave(event)">
      <div class="q-top"></div>
      <div class="q-header">
        <div class="q-badge">!</div>
        <div class="q-title-block">
          <div class="q-name">Do First</div>
          <div class="q-sub">Urgent · Important</div>
        </div>
        <div class="q-count" id="cnt-q1">0</div>
      </div>
      <div class="task-list" id="list-q1"></div>
    </div>

    <div class="quadrant q2" id="pane-q2" ondragover="onDragOver(event,'q2')" ondrop="onDrop(event,'q2')" ondragleave="onDragLeave(event)">
      <div class="q-top"></div>
      <div class="q-header">
        <div class="q-badge">→</div>
        <div class="q-title-block">
          <div class="q-name">Schedule</div>
          <div class="q-sub">Not Urgent · Important</div>
        </div>
        <div class="q-count" id="cnt-q2">0</div>
      </div>
      <div class="task-list" id="list-q2"></div>
    </div>
  </div>

  <div class="quadrant-row">
    <div class="quadrant q3" id="pane-q3" ondragover="onDragOver(event,'q3')" ondrop="onDrop(event,'q3')" ondragleave="onDragLeave(event)">
      <div class="q-top"></div>
      <div class="q-header">
        <div class="q-badge">↓</div>
        <div class="q-title-block">
          <div class="q-name">Delegate</div>
          <div class="q-sub">Urgent · Not Important</div>
        </div>
        <div class="q-count" id="cnt-q3">0</div>
      </div>
      <div class="task-list" id="list-q3"></div>
    </div>

    <div class="quadrant q4" id="pane-q4" ondragover="onDragOver(event,'q4')" ondrop="onDrop(event,'q4')" ondragleave="onDragLeave(event)">
      <div class="q-top"></div>
      <div class="q-header">
        <div class="q-badge">×</div>
        <div class="q-title-block">
          <div class="q-name">Eliminate</div>
          <div class="q-sub">Not Urgent · Not Important</div>
        </div>
        <div class="q-count" id="cnt-q4">0</div>
      </div>
      <div class="task-list" id="list-q4"></div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <h2 id="modal-title">Edit task</h2>
    <div class="field">
      <label>Task</label>
      <input type="text" id="modal-text" placeholder="What needs to be done?">
    </div>
    <div class="field">
      <label>Due Date</label>
      <input type="date" id="modal-due">
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="modal-notes" rows="3" placeholder="Any context or details…"></textarea>
    </div>
    <div class="field">
      <label>Quadrant</label>
      <select id="modal-q">
        <option value="q1">Do First — Urgent + Important</option>
        <option value="q2">Schedule — Not Urgent + Important</option>
        <option value="q3">Delegate — Urgent + Not Important</option>
        <option value="q4">Eliminate — Not Urgent + Not Important</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('eim-v2') || '[]');
let selectedQ = 'q1';
let activeFilter = 'all';
let editId = null;
let dragId = null;

function save() {
  localStorage.setItem('eim-v2', JSON.stringify(tasks));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  render();
}

// Pill selection
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    selectedQ = p.dataset.q;
  });
});

function quickAdd() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  tasks.push({ id: uid(), text, q: selectedQ, done: false, due: '', notes: '', created: Date.now() });
  save(); render();
  input.value = '';
  input.focus();
}

document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') quickAdd();
});

function toggleDone(id) {
  const t = tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}

function deleteTask(id) {
  tasks = tasks.filter(x => x.id !== id);
  save(); render();
}

function openModal(id) {
  editId = id;
  const t = tasks.find(x => x.id === id);
  document.getElementById('modal-text').value = t.text;
  document.getElementById('modal-due').value = t.due || '';
  document.getElementById('modal-notes').value = t.notes || '';
  document.getElementById('modal-q').value = t.q;
  document.getElementById('modal-title').textContent = 'Edit task';
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
    editId = null;
  }
}

function saveModal() {
  const t = tasks.find(x => x.id === editId);
  if (t) {
    t.text = document.getElementById('modal-text').value.trim() || t.text;
    t.due = document.getElementById('modal-due').value;
    t.notes = document.getElementById('modal-notes').value;
    t.q = document.getElementById('modal-q').value;
    save(); render();
  }
  closeModal();
}

// Drag & drop
function onDragStart(e, id) {
  dragId = id;
  setTimeout(() => document.getElementById('ti-' + id)?.classList.add('dragging'), 0);
  e.dataTransfer.effectAllowed = 'move';
}

function onDragEnd(id) {
  document.getElementById('ti-' + id)?.classList.remove('dragging');
  document.querySelectorAll('.quadrant').forEach(q => q.classList.remove('drag-over'));
}

function onDragOver(e, q) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.getElementById('pane-' + q).classList.add('drag-over');
}

function onDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}

function onDrop(e, q) {
  e.preventDefault();
  document.querySelectorAll('.quadrant').forEach(el => el.classList.remove('drag-over'));
  if (dragId) {
    const t = tasks.find(x => x.id === dragId);
    if (t) { t.q = q; save(); render(); }
    dragId = null;
  }
}

function render() {
  const qs = ['q1', 'q2', 'q3', 'q4'];
  const filtered = (q) => tasks.filter(t => {
    if (t.q !== q) return false;
    if (activeFilter === 'active') return !t.done;
    if (activeFilter === 'done') return t.done;
    return true;
  });

  qs.forEach(q => {
    const list = document.getElementById('list-' + q);
    const items = filtered(q);
    document.getElementById('cnt-' + q).textContent = tasks.filter(t => t.q === q && !t.done).length;

    if (items.length === 0) {
      list.innerHTML = `<div class="empty-state">${activeFilter === 'done' ? 'Nothing done here yet' : 'Drop tasks here'}</div>`;
      return;
    }

    list.innerHTML = items.map(t => {
      const dateStr = t.due ? `<div class="task-date">${t.due}</div>` : '';
      return `
        <div class="task-item ${t.done ? 'done' : ''}" id="ti-${t.id}"
          draggable="true"
          ondragstart="onDragStart(event,'${t.id}')"
          ondragend="onDragEnd('${t.id}')">
          <div class="task-check" onclick="toggleDone('${t.id}')">
            <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
              <path d="M1 3.2L3.4 5.5L8 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="task-text" ondblclick="openModal('${t.id}')">${escHtml(t.text)}</span>
          <div class="task-meta">
            <button class="task-del" onclick="deleteTask('${t.id}')">×</button>
            ${dateStr}
          </div>
        </div>`;
    }).join('');
  });

  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-q1').textContent = tasks.filter(t => t.q === 'q1' && !t.done).length;
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

render();
</script>
</body>
</html>
